<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Halley</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="bg-dark border-end" id="sidebar" style="width:260px;min-height:100vh;">
            <div class="sidebar-heading p-3 border-bottom">
                <h5 class="mb-0 text-primary"><i class="bi bi-graph-up-arrow me-2"></i>Trade Halley</h5>
                <small class="text-muted">Backtesting B3 & BMF</small>
            </div>
            <div class="list-group list-group-flush">
                <a href="#" class="list-group-item list-group-item-action bg-dark text-light nav-link active" data-page="dashboard">
                    <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-light nav-link" data-page="backtest">
                    <i class="bi bi-graph-up me-2"></i>Backtest
                </a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-light nav-link" data-page="bulk">
                    <i class="bi bi-collection me-2"></i>Backtest em Massa
                </a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-light nav-link" data-page="compare">
                    <i class="bi bi-bar-chart me-2"></i>Comparar
                </a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-light nav-link" data-page="strategies">
                    <i class="bi bi-lightbulb me-2"></i>Estratégias
                </a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-light nav-link" data-page="saved">
                    <i class="bi bi-bookmark me-2"></i>Salvos
                </a>
                <a href="#" class="list-group-item list-group-item-action bg-dark text-light nav-link" data-page="config">
                    <i class="bi bi-gear me-2"></i>Configurações
                </a>
            </div>
        </div>

        <!-- Page Content -->
        <div class="flex-grow-1">
            <nav class="navbar navbar-dark bg-dark border-bottom px-3 d-md-none">
                <button class="btn btn-outline-light btn-sm" onclick="document.getElementById('sidebar').classList.toggle('d-none')">
                    <i class="bi bi-list"></i>
                </button>
                <span class="navbar-brand mb-0 ms-2">Trade Halley</span>
            </nav>
            <div class="container-fluid p-4" id="main-content">
                <div class="text-center mt-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-3">Carregando Trade Halley...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" style="position:fixed;top:20px;right:20px;z-index:9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

    <!-- APENAS app.js — NÃO carrega api.js separado -->
    <script src="js/app.js"></script>
</body>
</html>
