<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trade Halley — Back-tests & Análise de Mercado</title>
  <meta name="description" content="Plataforma profissional de back-tests para B3 e BMF. Análise de estratégias com dados reais do mercado brasileiro.">
  <meta name="theme-color" content="#0a0e17">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner">
      <div class="spinner"></div>
      <div class="loading-text">Processando back-test...</div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- App Wrapper -->
  <div class="app-wrapper">

    <!-- ====== SIDEBAR ====== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="logo-icon">TH</div>
          <div class="logo-text">Trade Halley</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Principal</div>
          <div class="nav-item active" data-page="dashboard">
            <i class="fas fa-th-large"></i>
            <span>Dashboard</span>
          </div>
        </div>

        <div class="nav-section">
          <div class="nav-section-title">Back-tests</div>
          <div class="nav-item" data-page="b3-daily">
            <i class="fas fa-chart-bar"></i>
            <span>B3 Daily</span>
          </div>
          <div class="nav-item" data-page="b3-intraday">
            <i class="fas fa-chart-area"></i>
            <span>B3 Intraday</span>
          </div>
          <div class="nav-item" data-page="bmf-intraday">
            <i class="fas fa-exchange-alt"></i>
            <span>BMF Intraday</span>
          </div>
        </div>

        <div class="nav-section">
          <div class="nav-section-title">Informações</div>
          <div class="nav-item" onclick="window.open('https://github.com/WanderHalley', '_blank')">
            <i class="fab fa-github"></i>
            <span>GitHub</span>
          </div>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="version">Trade Halley v1.0.0</div>
      </div>
    </aside>

    <!-- ====== MAIN ====== -->
    <main class="main-content">

      <!-- Header -->
      <header class="top-header">
        <div class="header-left">
          <button class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
          </button>
          <h1 class="page-title" id="pageTitle">Dashboard</h1>
        </div>
        <div class="header-right">
          <div class="market-status">
            <div class="status-dot" id="marketStatusDot"></div>
            <span id="marketStatusText">Verificando...</span>
          </div>
          <button class="header-btn" onclick="App.refreshDashboard()">
            <i class="fas fa-sync-alt"></i>
            <span>Atualizar</span>
          </button>
        </div>
      </header>

      <!-- Page Content (SPA - renderizado via JS) -->
      <div class="page-content" id="pageContent">
        <div class="loading-inline">
          <div class="spinner-sm"></div>
          <span>Inicializando Trade Halley...</span>
        </div>
      </div>

    </main>
  </div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
